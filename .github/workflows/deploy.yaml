name: Deploy VitePress to gh-pages branch

on:
  # Spustí se automaticky při pushnutí do hlavní větve (změň na master, pokud používáš master)
  push:
    branches: [master]

permissions:
  # Akce potřebuje právo zápisu, aby mohla vytvořit commit do větve gh-pages
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          # GitHub tento token poskytuje automaticky, nemusíš ho nikde zakládat
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Složka, kde VitePress vygeneruje hotový web
          publish_dir: docs/.vitepress/dist
          # Větev, do které se má výsledek nahrát
          publish_branch: gh-pages
          # Aby to nesmazalo historii commitů v gh-pages větvi, ale jen přidalo nový
          keep_files: false
          commit_message: "Deploy dokumentace [skip ci]"